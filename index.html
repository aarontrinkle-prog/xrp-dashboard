<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRP · Kalshi Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0e0e;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    font-size: 14px;
    font-weight: 400;
    color: #888;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; display: inline-block; margin-right: 6px; }
  .dot.live { background: #1D9E75; box-shadow: 0 0 6px #1D9E75; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .card {
    background: #181818;
    border: 0.5px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .card-label { font-size: 10px; color: #555; margin-bottom: 4px; letter-spacing: 0.05em; }
  .card-value { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .card-sub { font-size: 10px; margin-top: 3px; color: #666; }
  .card-value.sm { font-size: 15px; }
  .card-value.xs { font-size: 13px; }
  .green { color: #1D9E75; }
  .red { color: #E24B4A; }
  .amber { color: #EF9F27; }
  .blue { color: #378ADD; }
  .muted { color: #555; }
  .tf-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
  .tf-btn {
    background: #181818;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    color: #888;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 4px 12px;
    transition: all 0.15s;
  }
  .tf-btn:hover { border-color: #444; color: #ccc; }
  .tf-btn.active { background: #1a2a1a; border-color: #1D9E75; color: #1D9E75; }
  .refresh-btn {
    background: #181818;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    color: #888;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 4px 14px;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: #378ADD; color: #378ADD; }
  .chart-wrap { position: relative; width: 100%; height: 180px; margin-bottom: 4px; }
  .rsi-wrap { position: relative; width: 100%; height: 70px; margin-bottom: 10px; }
  .squeeze-bar {
    background: #181818;
    border: 0.5px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    border-left: 3px solid #2a2a2a;
  }
  .squeeze-bar.tight { border-left-color: #E24B4A; }
  .squeeze-bar.mild { border-left-color: #EF9F27; }
  .squeeze-bar.none { border-left-color: #2a2a2a; }
  .analysis-btn {
    width: 100%;
    background: #1a2a1a;
    border: 0.5px solid #1D9E75;
    border-radius: 8px;
    color: #1D9E75;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 12px;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .analysis-btn:hover { background: #1D9E75; color: #0e0e0e; }
  .copy-area {
    display: none;
    background: #141414;
    border: 0.5px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .copy-area.visible { display: block; }
  .copy-area textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    resize: none;
    outline: none;
    line-height: 1.6;
  }
  .copy-btn {
    background: #1a2533;
    border: 0.5px solid #378ADD;
    border-radius: 4px;
    color: #378ADD;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    margin-top: 8px;
    padding: 6px 16px;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #378ADD; color: #0e0e0e; }
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .error-msg { font-size: 10px; color: #E24B4A; margin-top: 6px; min-height: 14px; }
  .ticker-badge {
    font-size: 10px;
    color: #555;
    background: #181818;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    padding: 2px 8px;
  }
  .threshold-line { font-size: 10px; color: #555; margin-top: 3px; }
</style>
</head>
<body>

<h1>
  <span><span class="dot live" id="liveDot"></span>XRP · KALSHI DASHBOARD</span>
  <span class="ticker-badge">KXXRP15M</span>
</h1>

<div class="status-row">
  <span style="font-size:10px; color:#555;" id="lastUpdate">initializing...</span>
  <button class="refresh-btn" onclick="refreshAll()">↻ refresh</button>
</div>

<div class="grid2">
  <div class="card">
    <div class="card-label">XRP spot</div>
    <div class="card-value blue" id="spotPrice">–</div>
    <div class="card-sub" id="spotChange">–</div>
  </div>
  <div class="card">
    <div class="card-label">kalshi threshold</div>
    <div class="card-value" id="kalshiThreshold">–</div>
    <div class="card-sub" id="vsThreshold">–</div>
  </div>
  <div class="card">
    <div class="card-label">time left</div>
    <div class="card-value" id="timeLeft">–</div>
    <div class="card-sub" id="marketTicker">–</div>
  </div>
  <div class="card">
    <div class="card-label">yes / no</div>
    <div class="card-value sm" id="yesNo">–</div>
    <div class="card-sub" id="marketStatus">–</div>
  </div>
</div>

<div class="tf-row">
  <button class="tf-btn active" id="btn1m" onclick="setTF('1m')">1m</button>
  <button class="tf-btn" id="btn5m" onclick="setTF('5m')">5m</button>
  <button class="tf-btn" id="btn15m" onclick="setTF('15m')">15m</button>
  <span style="font-size:10px; color:#555; margin-left:4px;" id="tfStatus"></span>
</div>

<div class="grid3">
  <div class="card">
    <div class="card-label">RSI(6)</div>
    <div class="card-value sm" id="rsi6">–</div>
  </div>
  <div class="card">
    <div class="card-label">RSI(12)</div>
    <div class="card-value sm" id="rsi12">–</div>
  </div>
  <div class="card">
    <div class="card-label">RSI(24)</div>
    <div class="card-value sm" id="rsi24">–</div>
  </div>
</div>

<div class="grid3">
  <div class="card">
    <div class="card-label">BB upper</div>
    <div class="card-value xs" id="bbUpper">–</div>
  </div>
  <div class="card">
    <div class="card-label">BB mid</div>
    <div class="card-value xs" id="bbMid">–</div>
  </div>
  <div class="card">
    <div class="card-label">BB lower</div>
    <div class="card-value xs" id="bbLower">–</div>
  </div>
</div>

<div class="squeeze-bar none" id="squeezeBar">
  <div class="card-label">bb squeeze detector</div>
  <div style="font-size:12px; margin-top:3px;" id="squeezeStatus">–</div>
</div>

<div class="chart-wrap">
  <canvas id="priceChart" role="img" aria-label="XRP price chart with Bollinger Bands"></canvas>
</div>
<div class="rsi-wrap">
  <canvas id="rsiChart" role="img" aria-label="RSI indicator chart"></canvas>
</div>

<button class="analysis-btn" onclick="buildAnalysis()">⬡ generate cycle analysis text</button>

<div class="copy-area" id="copyArea">
  <div class="card-label" style="margin-bottom:6px;">copy this → paste into claude chat</div>
  <textarea id="analysisText" rows="12" readonly></textarea>
  <button class="copy-btn" onclick="copyText()">copy to clipboard</button>
  <div style="font-size:10px; color:#1D9E75; margin-top:6px; display:none;" id="copiedMsg">✓ copied!</div>
</div>

<div class="error-msg" id="errorMsg"></div>

<script>
let currentTF = '1m';
let priceChart, rsiChart;
let dashData = {};
let timerInterval;

const KALSHI_DIRECT = 'https://api.elections.kalshi.com/trade-api/v2';
const BINANCE_DIRECT = 'https://api.binance.com/api/v3';
const PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://proxy.cors.sh/',
];

async function safeFetch(url) {
  const WORKER = 'https://xrp-proxy.aaron-trinkle.workers.dev/?url=';
  const r = await fetch(WORKER + encodeURIComponent(url));
  const text = await r.text();
  console.log('worker response for', url.substring(0,50), ':', text.substring(0,100));
  return JSON.parse(text);
}

async function init() {
  await refreshAll();
  setInterval(refreshAll, 30000);
}

function setTF(tf) {
  currentTF = tf;
  ['1m','5m','15m'].forEach(t => {
    const b = document.getElementById('btn'+t);
    if(b) { b.classList.toggle('active', t===tf); }
  });
  fetchBinance();
}

async function refreshAll() {
  document.getElementById('liveDot').className = 'dot';
  await Promise.all([fetchKalshi(), fetchBinance()]);
  document.getElementById('liveDot').className = 'dot live';
  document.getElementById('lastUpdate').textContent = 'updated ' + new Date().toLocaleTimeString();
}

async function fetchKalshi() {
  try {
    const kalshiUrl = `${KALSHI_DIRECT}/markets?series_ticker=KXXRP15M&limit=20&status=open`;
    let raw = await safeFetch(kalshiUrl);
    const data = (raw && raw.contents) ? JSON.parse(raw.contents) : raw;
    if(!data.markets || !data.markets.length) {
      document.getElementById('kalshiThreshold').textContent = 'no markets found';
      return;
    }
    const now = Date.now();
    const markets = data.markets.sort((a,b) => {
      const aClose = new Date(a.close_time).getTime();
      const bClose = new Date(b.close_time).getTime();
      const aFuture = aClose > now;
      const bFuture = bClose > now;
      if(aFuture && !bFuture) return -1;
      if(!aFuture && bFuture) return 1;
      return aFuture ? aClose - bClose : bClose - aClose;
    });
    const m = markets[0];
    dashData.market = m;

    // Try multiple fields for strike price
    // Log all fields for debugging
    console.log('MARKET FIELDS:', JSON.stringify(m, null, 2));
    
    let strike = null;
    // Try all possible price fields
    const priceFields = ['floor_strike','cap_strike','strike_price','result','yes_sub_title','subtitle','custom_strike'];
    for(const f of priceFields) {
      if(m[f] !== undefined && m[f] !== null) {
        const val = parseFloat(m[f]);
        if(!isNaN(val) && val > 0.5 && val < 5) { strike = val; break; }
        // Try parsing string
        if(typeof m[f] === 'string') {
          const match = m[f].match(/(1\.[2-9][\d]+)/);
          if(match) { strike = parseFloat(match[1]); break; }
        }
      }
    }
    // Show raw subtitle/title as fallback
    const displayThreshold = strike !== null ? '$' + strike.toFixed(4) : (m.yes_sub_title || m.subtitle || m.title || '–');

    dashData.strike = strike;
    document.getElementById('kalshiThreshold').textContent = displayThreshold;
    document.getElementById('marketTicker').textContent = m.ticker || '–';

    console.log('yes_ask:', m.yes_ask, 'no_ask:', m.no_ask, 'yes_bid:', m.yes_bid, 'no_bid:', m.no_bid);
    const yes = m.yes_ask !== undefined ? m.yes_ask + '¢' : (m.yes_bid !== undefined ? m.yes_bid+'¢' : '–');
    const no = m.no_ask !== undefined ? m.no_ask + '¢' : (m.no_bid !== undefined ? m.no_bid+'¢' : '–');
    document.getElementById('yesNo').textContent = `Y ${yes}  /  N ${no}`;
    document.getElementById('marketStatus').textContent = m.status || 'open';

    if(m.close_time) startCountdown(new Date(m.close_time));
    updateVsThreshold();
    clearError('kalshi');
  } catch(e) {
    document.getElementById('kalshiThreshold').textContent = 'error';
    setError('kalshi: ' + e.message);
  }
}

function startCountdown(closeTime) {
  if(timerInterval) clearInterval(timerInterval);
  function tick() {
    const remaining = Math.max(0, Math.floor((closeTime - Date.now()) / 1000));
    const mins = Math.floor(remaining/60);
    const secs = remaining%60;
    const el = document.getElementById('timeLeft');
    el.textContent = mins + ':' + String(secs).padStart(2,'0');
    el.className = 'card-value ' + (remaining < 60 ? 'red' : remaining < 120 ? 'amber' : '');
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function updateVsThreshold() {
  if(!dashData.strike || !dashData.spot) return;
  const diff = (dashData.spot - parseFloat(dashData.strike));
  const el = document.getElementById('vsThreshold');
  el.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(4) + ' vs threshold';
  el.className = 'card-sub ' + (diff >= 0 ? 'green' : 'red');
}

async function fetchBinance() {
  try {
    document.getElementById('tfStatus').textContent = 'fetching...';
    const binanceUrl = `${BINANCE_DIRECT}/klines?symbol=XRPUSDT&interval=${currentTF}&limit=60`;
    let data = await safeFetch(binanceUrl);
    // allorigins wraps in {contents: ...}
    if(data && data.contents) data = JSON.parse(data.contents);
    if(!Array.isArray(data) || !data.length) throw new Error('empty data');

    const closes = data.map(c => parseFloat(c[4]));
    const spot = closes[closes.length-1];
    dashData.spot = spot;

    document.getElementById('spotPrice').textContent = '$' + spot.toFixed(4);
    const prevClose = closes[closes.length-2];
    const chg = ((spot-prevClose)/prevClose*100);
    const chgEl = document.getElementById('spotChange');
    chgEl.textContent = (chg>=0?'+':'') + chg.toFixed(3) + '%';
    chgEl.className = 'card-sub ' + (chg>=0?'green':'red');

    const bb = calcBB(closes, 20, 2);
    dashData.bb = bb;
    document.getElementById('bbUpper').textContent = bb.upper.toFixed(4);
    document.getElementById('bbMid').textContent = bb.mid.toFixed(4);
    document.getElementById('bbLower').textContent = bb.lower.toFixed(4);

    const bw = (bb.upper-bb.lower)/bb.mid*100;
    dashData.bw = bw;
    const sqBar = document.getElementById('squeezeBar');
    const sqSt = document.getElementById('squeezeStatus');
    if(bw < 0.10) {
      sqBar.className='squeeze-bar tight';
      sqSt.innerHTML='<span style="color:#E24B4A">⚠ TIGHT SQUEEZE ('+bw.toFixed(3)+'%) — vol breakout imminent</span>';
    } else if(bw < 0.20) {
      sqBar.className='squeeze-bar mild';
      sqSt.innerHTML='<span style="color:#EF9F27">mild squeeze ('+bw.toFixed(3)+'%)</span>';
    } else {
      sqBar.className='squeeze-bar none';
      sqSt.innerHTML='<span style="color:#555">no squeeze ('+bw.toFixed(3)+'%)</span>';
    }

    const rsi6 = calcRSI(closes, 6);
    const rsi12 = calcRSI(closes, 12);
    const rsi24 = calcRSI(closes, 24);
    dashData.rsi = {rsi6, rsi12, rsi24};
    setRSIEl('rsi6', rsi6);
    setRSIEl('rsi12', rsi12);
    setRSIEl('rsi24', rsi24);

    const labels = data.slice(-30).map(c => {
      const d = new Date(c[0]);
      return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    });
    const prices = data.slice(-30).map(c => parseFloat(c[4]));

    const rsiSeries = [];
    for(let i=7; i<=data.length; i++) {
      rsiSeries.push(calcRSI(data.slice(0,i).map(c=>parseFloat(c[4])),6));
    }

    drawPriceChart(labels, prices, bb, dashData.strike);
    drawRSIChart(labels.slice(-Math.min(30, rsiSeries.length)), rsiSeries.slice(-30));

    updateVsThreshold();
    document.getElementById('tfStatus').textContent = '';
    clearError('binance');
  } catch(e) {
    document.getElementById('tfStatus').textContent = 'error';
    setError('binance: ' + e.message);
  }
}

function setRSIEl(id, val) {
  const el = document.getElementById(id);
  el.textContent = val.toFixed(1);
  el.className = 'card-value sm ' + (val < 30 ? 'green' : val > 70 ? 'red' : '');
}

function calcBB(closes, period, mult) {
  const slice = closes.slice(-period);
  const mid = slice.reduce((a,b)=>a+b,0)/period;
  const std = Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mid,2),0)/period);
  return {upper:mid+mult*std, mid, lower:mid-mult*std};
}

function calcRSI(closes, period) {
  if(closes.length < period+1) return 50;
  let gains=0, losses=0;
  const start = closes.length - period - 1;
  for(let i=start+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  const avgGain = gains/period;
  const avgLoss = losses/period;
  if(avgLoss === 0) return 100;
  const rs = avgGain/avgLoss;
  return 100-(100/(1+rs));
}

function drawPriceChart(labels, prices, bb, strike) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  if(priceChart) priceChart.destroy();
  const datasets = [
    {label:'price', data:prices, borderColor:'#378ADD', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false},
    {label:'upper', data:Array(prices.length).fill(parseFloat(bb.upper.toFixed(4))), borderColor:'#EF9F27', borderWidth:0.8, pointRadius:0, borderDash:[4,3], fill:false},
    {label:'mid', data:Array(prices.length).fill(parseFloat(bb.mid.toFixed(4))), borderColor:'#444', borderWidth:0.8, pointRadius:0, borderDash:[2,2], fill:false},
    {label:'lower', data:Array(prices.length).fill(parseFloat(bb.lower.toFixed(4))), borderColor:'#EF9F27', borderWidth:0.8, pointRadius:0, borderDash:[4,3], fill:false},
  ];
  if(strike) {
    datasets.push({label:'threshold', data:Array(prices.length).fill(parseFloat(parseFloat(strike).toFixed(4))), borderColor:'#E24B4A', borderWidth:1, pointRadius:0, borderDash:[6,3], fill:false});
  }
  priceChart = new Chart(ctx, {
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:8}, maxTicksLimit:6, color:'#444'}, grid:{color:'rgba(255,255,255,0.03)'}},
        y:{ticks:{font:{size:8}, color:'#444'}, grid:{color:'rgba(255,255,255,0.03)'}}
      }
    }
  });
}

function drawRSIChart(labels, rsiVals) {
  const ctx = document.getElementById('rsiChart').getContext('2d');
  if(rsiChart) rsiChart.destroy();
  rsiChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'RSI6', data:rsiVals, borderColor:'#D4537E', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false},
        {label:'70', data:Array(labels.length).fill(70), borderColor:'#E24B4A', borderWidth:0.5, pointRadius:0, borderDash:[2,2], fill:false},
        {label:'30', data:Array(labels.length).fill(30), borderColor:'#1D9E75', borderWidth:0.5, pointRadius:0, borderDash:[2,2], fill:false},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{display:false}, grid:{display:false}},
        y:{min:0, max:100, ticks:{font:{size:8}, color:'#444', stepSize:50}, grid:{color:'rgba(255,255,255,0.03)'}}
      }
    }
  });
}

function buildAnalysis() {
  const spot = dashData.spot ? '$'+dashData.spot.toFixed(4) : '–';
  const threshold = document.getElementById('kalshiThreshold').textContent;
  const timeLeft = document.getElementById('timeLeft').textContent;
  const rsi6 = document.getElementById('rsi6').textContent;
  const rsi12 = document.getElementById('rsi12').textContent;
  const rsi24 = document.getElementById('rsi24').textContent;
  const bbu = document.getElementById('bbUpper').textContent;
  const bbm = document.getElementById('bbMid').textContent;
  const bbl = document.getElementById('bbLower').textContent;
  const squeeze = document.getElementById('squeezeStatus').textContent.replace(/[⚠]/g,'').trim();
  const yesno = document.getElementById('yesNo').textContent;
  const vsT = document.getElementById('vsThreshold').textContent;

  const text = `LIVE DASHBOARD — ${currentTF} timeframe — ${new Date().toLocaleTimeString()}

KALSHI
  Threshold : ${threshold}
  Time left : ${timeLeft}
  Yes / No  : ${yesno}

SPOT
  XRP price : ${spot}
  ${vsT}

BOLLINGER BANDS (${currentTF})
  Upper : ${bbu}
  Mid   : ${bbm}
  Lower : ${bbl}
  Squeeze: ${squeeze}

RSI (${currentTF})
  RSI(6)  : ${rsi6}
  RSI(12) : ${rsi12}
  RSI(24) : ${rsi24}

Please give cycle call in format:
Next threshold / Direction / Conviction / Bet size / Target exit / Stop loss / Strategy`;

  document.getElementById('analysisText').value = text;
  document.getElementById('copyArea').classList.add('visible');
  document.getElementById('analysisText').rows = text.split('\n').length + 1;
}

function copyText() {
  const ta = document.getElementById('analysisText');
  ta.select();
  document.execCommand('copy');
  const msg = document.getElementById('copiedMsg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display='none', 2000);
}

function setError(msg) {
  document.getElementById('errorMsg').textContent = msg;
}
function clearError(src) {
  const cur = document.getElementById('errorMsg').textContent;
  if(cur.startsWith(src)) document.getElementById('errorMsg').textContent = '';
}

init();
</script>
</body>
</html>
